title: journal
description: Personal work journal — PARA + Bullet Journal for humans and AI agents
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# Only include PARA content — exclude tooling
include:
  - inbox.md
  - projects
  - areas
  - resources
  - archive

exclude:
  - bin
  - .zk
  - justfile
  - LICENSE
  - AGENTS.md
  - CLAUDE.md
  - "*.org"
  - .gitignore
