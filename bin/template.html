<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title$ — journal</title>
<style>
:root {
  --fg: #d4d4d4;
  --bg: #1e1e1e;
  --dim: #6a6a6a;
  --link: #7cacf8;
  --link-visited: #b4a0f8;
  --border: #333;
  --accent: #e8e8e8;
}
@media (prefers-color-scheme: light) {
  :root {
    --fg: #1e1e1e;
    --bg: #fafafa;
    --dim: #888;
    --link: #2060c0;
    --link-visited: #6040a0;
    --border: #ddd;
    --accent: #111;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace;
  font-size: 14px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  max-width: 80ch;
  margin: 0 auto;
  padding: 1rem;
}
a { color: var(--link); text-decoration: none; }
a:visited { color: var(--link-visited); }
a:hover { text-decoration: underline; }
nav.breadcrumb {
  color: var(--dim);
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
nav.breadcrumb a { color: var(--dim); }
nav.breadcrumb a:hover { color: var(--link); }
nav.breadcrumb span { color: var(--accent); }
h1 { font-size: 1.3em; color: var(--accent); margin: 0.5em 0; }
h2 { font-size: 1.1em; color: var(--accent); margin: 1.2em 0 0.4em; }
h3 { font-size: 1em; color: var(--accent); margin: 1em 0 0.3em; }
p { margin: 0.5em 0; }
ul, ol { margin: 0.3em 0 0.3em 1.5em; }
li { margin: 0.15em 0; }
code {
  background: rgba(128,128,128,0.15);
  padding: 0.1em 0.3em;
  border-radius: 2px;
  font-size: 0.95em;
}
pre {
  background: rgba(128,128,128,0.1);
  padding: 0.8em 1em;
  overflow-x: auto;
  border-radius: 3px;
  margin: 0.5em 0;
}
pre code { background: none; padding: 0; }
table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
th, td {
  text-align: left;
  padding: 0.3em 0.8em;
  border-bottom: 1px solid var(--border);
}
th { color: var(--accent); }
blockquote {
  border-left: 2px solid var(--border);
  padding-left: 1em;
  color: var(--dim);
  margin: 0.5em 0;
}
hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
input[type="text"] {
  font-family: inherit;
  font-size: inherit;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
  padding: 0.4em 0.6em;
  width: 100%;
  border-radius: 2px;
}
input[type="text"]:focus { outline: 1px solid var(--link); }
.search-results { list-style: none; margin: 0; padding: 0; }
.search-results li { padding: 0.5em 0; border-bottom: 1px solid var(--border); }
.result-path { color: var(--dim); font-size: 12px; }
.result-snippet { color: var(--dim); font-size: 13px; margin-top: 0.2em; }
footer {
  margin-top: 2rem;
  padding-top: 0.5rem;
  border-top: 1px solid var(--border);
  color: var(--dim);
  font-size: 12px;
}
/* checkbox styling for bujo notation */
li input[type="checkbox"] { margin-right: 0.3em; }
strong { color: var(--accent); }
</style>
</head>
<body>
<nav class="breadcrumb">$breadcrumb$</nav>
$body$
<footer>journal</footer>
</body>
</html>
